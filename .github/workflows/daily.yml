name: Daily GitHub Hotspots

on:
  schedule:
    # 08:17 Asia/Shanghai (GitHub Actions cron uses UTC).
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-hotspots-writer
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUTF8: "1"
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CJK fonts for poster rendering
        run: |
          sudo apt-get update
          sudo apt-get install --yes fonts-noto-cjk

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run quality gates
        run: |
          python -m pytest
          python -m ruff check .
          python -m ruff format --check .

      - name: Generate daily snapshot and report
        run: python -m github_hotspots.cli run --period daily

      - name: Commit generated daily artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/snapshots reports/daily
          if git diff --cached --quiet; then
            RESULT="No daily artifact changes to commit."
          else
            git commit -m "chore(hotspots): update daily report"
            git push
            RESULT="Committed and pushed $(git rev-parse --short HEAD)."
          fi
          REPORT_PATH="$(find reports/daily -maxdepth 1 -name '*.json' -type f -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          {
            echo "## Daily GitHub Hotspots"
            echo "- Result: ${RESULT}"
            echo "- Latest report: \`${REPORT_PATH}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"
