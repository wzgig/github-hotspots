name: Weekly GitHub Hotspots

on:
  schedule:
    # Monday 08:27 Asia/Shanghai (GitHub Actions cron uses UTC).
    - cron: "27 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-hotspots-writer
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUTF8: "1"
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Generate weekly snapshot and report
        run: python -m github_hotspots.cli run --period weekly

      - name: Commit generated weekly artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/snapshots reports/weekly
          if git diff --cached --quiet; then
            echo "No weekly artifact changes to commit."
            exit 0
          fi
          git commit -m "chore(hotspots): update weekly report"
          git push
